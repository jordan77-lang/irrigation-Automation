[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags = -I include
board_build.filesystem = littlefs
lib_deps =
  ArduinoJson
; Set your board's COM port when flashing (Device Manager on Windows)
; upload_port = COM5
; monitor_port = COM5
